name: datapulsecm

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-DataPulseCM@2024!}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-DataPulseCM@2024!}\" -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Inicialização do banco — roda os scripts SQL na ordem correta e encerra
  # ---------------------------------------------------------------------------
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-DataPulseCM@2024!}"
    volumes:
      - ./database/scripts:/scripts:ro
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        SQLCMD=/opt/mssql-tools18/bin/sqlcmd
        SERVER="sqlserver,1433"
        PASS="$$SA_PASSWORD"

        echo ">>> Criando banco DataPulseCM..."
        $$SQLCMD -S $$SERVER -U sa -P "$$PASS" -No \
          -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'DataPulseCM') CREATE DATABASE [DataPulseCM]"

        echo ">>> 01 - Criando tabelas..."
        $$SQLCMD -S $$SERVER -U sa -P "$$PASS" -d DataPulseCM -No -i /scripts/01-create-tables.sql

        echo ">>> 02 - Criando stored procedures..."
        $$SQLCMD -S $$SERVER -U sa -P "$$PASS" -d DataPulseCM -No -i /scripts/02-create-stored-procedures.sql

        echo ">>> 03 - Inserindo dados de exemplo..."
        $$SQLCMD -S $$SERVER -U sa -P "$$PASS" -d DataPulseCM -No -i /scripts/03-seed-data.sql

        echo ">>> 04 - Enriquecendo campos de log..."
        $$SQLCMD -S $$SERVER -U sa -P "$$PASS" -d DataPulseCM -No -i /scripts/04-enrich-log-fields.sql

        echo ">>> Banco inicializado com sucesso!"
    restart: "no"

  # ---------------------------------------------------------------------------
  # API .NET 9
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DataPulseCM;User Id=sa;Password=${SA_PASSWORD:-DataPulseCM@2024!};TrustServerCertificate=True;"
      SEQ_URL: "${SEQ_URL:-}"
      SEQ_API_KEY: "${SEQ_API_KEY:-}"
    ports:
      - "5105:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - api_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend React (nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api    # nginx faz proxy /api → api:8080
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
  api_logs:
